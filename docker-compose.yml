services:
  rv1126b-builder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: rv1126b-builder:${IMAGE_TAG:-v0.2.0}
    container_name: rv1126b-build-env
    privileged: true
    # Run as root to avoid fakeroot semaphore issues
    user: "0:0"
    volumes:
      # Mount SDK directory from host (REQUIRED)
      # Default: ../RV1126B-P-SDK (assumes SDK is in parallel directory)
      - ${SDK_PATH:-../RV1126B-P-SDK}:/workspace:rw
      # Mount the full parent workspace from host for docs, apps, and related repos
      # Default: .. (assumes this repo lives inside the RV1126B-P workspace root)
      - ${HOST_RV1126BP_PATH:-..}:/workspace-host:rw
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      - TZ=Asia/Hong_Kong
      - LANG=en_US.UTF-8
    # Optional: Limit resources
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '8'
    #       memory: 16G
